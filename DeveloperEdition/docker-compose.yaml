# docker-compose.yaml for Creators Dashboard developers edition



services:
  ##################################
  # Welcome Service
  ##################################
  welcome:
    image: ghcr.io/coaigo/impact:latest
    ports:
      - "127.0.0.1:8080:80"
    profiles:
      - all
      - mongodb
      - administrator
      - administrator-api
      - evaluator
      - evaluator-api
      - creator
      - creator-api
      - classifier
      - classifier-api

  ##################################
  # Backing Services
  ##################################
  mongodb:
    image: mongo:7.0.5
    ports:
      - "127.0.0.1:27017:27017"
    extra_hosts:
      - "mongodb:127.0.0.1"
    healthcheck:
      test: echo "db.runCommand('ping')" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 3
    command: ["--bind_ip_all", "--port", "27017"]
    profiles:
      - all
      - mongodb
      - administrator
      - administrator-api
      - evaluator
      - evaluator-api
      - creator
      - creator-api
      - classifier
      - classifier-api

  ##################################
  # Mongo Database Configuration Utilities
  ##################################
  mongodb_api:
    image: ghcr.io/coaigo/impact_mongodb_api:latest
    restart: no
    ports:
      - "127.0.0.1:9090:9090"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: impact
      AUTO_PROCESS: True
      LOAD_TEST_DATA: True
      API_PORT: 9090
      SPA_PORT: 9091
      UI_HEADER: "Creators Dashboard Schemas"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - all
      - mongodb
      - administrator
      - administrator-api
      - evaluator
      - evaluator-api
      - creator
      - creator-api
      - classifier
      - classifier-api

  mongodb_spa:
    # spa_ref (configurator_spa): fixed utility image, not impact_…
    image: ghcr.io/agile-learning-institute/mongodb_configurator_spa:latest
    restart: no
    ports:
      - "127.0.0.1:9091:9091"
    environment:
      API_HOST: mongodb_api
      API_PORT: 9090
      SPA_PORT: 9091
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - mongodb
      - administrator
      - administrator-api
      - evaluator
      - evaluator-api
      - creator
      - creator-api
      - classifier
      - classifier-api

  ##################################
  # Microservice domains (from architecture)
  ##################################
  administrator_api:
    image: ghcr.io/coaigo/impact_administrator_api:latest
    restart: no
    ports:
      - "127.0.0.1:9094:9094"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: impact
      LOGGING_LEVEL: "INFO"
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-fixed}
      API_PORT: 9094
      SAMPLE_API_PORT: 9094
      SAMPLE_SPA_PORT: 9095
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - administrator
      - administrator-api

  administrator_spa:
    image: ghcr.io/coaigo/impact_administrator_spa:latest
    restart: no
    ports:
      - "127.0.0.1:9095:80"
    environment:
      API_HOST: administrator_api
      API_PORT: 9094
      IDP_LOGIN_URI: ${IDP_LOGIN_URI:-http://localhost:8080/}
    depends_on:
      administrator_api:
        condition: service_started
    profiles:
      - all
      - administrator

  evaluator_api:
    image: ghcr.io/coaigo/impact_evaluator_api:latest
    restart: no
    ports:
      - "127.0.0.1:9096:9096"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: impact
      LOGGING_LEVEL: "INFO"
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-fixed}
      API_PORT: 9096
      SAMPLE_API_PORT: 9096
      SAMPLE_SPA_PORT: 9097
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - evaluator
      - evaluator-api

  evaluator_spa:
    image: ghcr.io/coaigo/impact_evaluator_spa:latest
    restart: no
    ports:
      - "127.0.0.1:9097:80"
    environment:
      API_HOST: evaluator_api
      API_PORT: 9096
      IDP_LOGIN_URI: ${IDP_LOGIN_URI:-http://localhost:8080/}
    depends_on:
      evaluator_api:
        condition: service_started
    profiles:
      - all
      - evaluator

  creator_api:
    image: ghcr.io/coaigo/impact_creator_api:latest
    restart: no
    ports:
      - "127.0.0.1:9098:9098"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: impact
      LOGGING_LEVEL: "INFO"
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-fixed}
      API_PORT: 9098
      SAMPLE_API_PORT: 9098
      SAMPLE_SPA_PORT: 9099
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - creator
      - creator-api

  creator_spa:
    image: ghcr.io/coaigo/impact_creator_spa:latest
    restart: no
    ports:
      - "127.0.0.1:9099:80"
    environment:
      API_HOST: creator_api
      API_PORT: 9098
      IDP_LOGIN_URI: ${IDP_LOGIN_URI:-http://localhost:8080/}
    depends_on:
      creator_api:
        condition: service_started
    profiles:
      - all
      - creator

  classifier_api:
    image: ghcr.io/coaigo/impact_classifier_api:latest
    restart: no
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: impact
      LOGGING_LEVEL: "INFO"
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-fixed}
      API_PORT: 9100
      SAMPLE_API_PORT: 9100
      SAMPLE_SPA_PORT: 9101
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - classifier
      - classifier-api

  classifier_spa:
    image: ghcr.io/coaigo/impact_classifier_spa:latest
    restart: no
    ports:
      - "127.0.0.1:9101:80"
    environment:
      API_HOST: classifier_api
      API_PORT: 9100
      IDP_LOGIN_URI: ${IDP_LOGIN_URI:-http://localhost:8080/}
    depends_on:
      classifier_api:
        condition: service_started
    profiles:
      - all
      - classifier